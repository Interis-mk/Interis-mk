    <link rel="preconnect" href="https://fonts.gstatic.com">

    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" href="/Interis_Favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Kevin Hamelink</title>
    <script>
        (function() {
            // Check localStorage first, then system preference, default to dark
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');

            // Apply theme immediately
            document.documentElement.setAttribute('data-theme', theme);

            // Save if not already saved
            if (!savedTheme) {
                localStorage.setItem('theme', theme);
            }
        })();
    </script>
    <!-- GitHub Pages SPA routing fix -->
    <script>
        // Single Page Apps for GitHub Pages
        // This script checks to see if a redirect is present in the query string,
        // converts it back to the correct path using HTML5 history API
        (function(l) {
            if (l.search[1] === '/' ) {
                var decoded = l.search.slice(1).split('&').map(function(s) {
                    return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location))
    </script>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.js"></script>
</body>
